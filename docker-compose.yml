services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: "${DB_POOL_USER}"
      POSTGRES_PASSWORD: "${DB_POOL_PASSWORD}"
      POSTGRES_DB: "${DB_POOL_DATABASE}"
    ports:
      - "${DB_POOL_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_POOL_DATABASE}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
