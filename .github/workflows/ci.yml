name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint
      - run: pnpm fmt:check
      - run: pnpm typecheck
      - run: pnpm coverage

      - run: pnpm --filter @jailu/web exec playwright install --with-deps chromium
      - run: pnpm test:e2e
