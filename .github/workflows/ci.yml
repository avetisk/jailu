name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: jailu
          POSTGRES_PASSWORD: jailu
          POSTGRES_DB: jailu
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U jailu"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      # The api and web configs are defaults-free (fail-loud): CI supplies every required var.
      API_HOST: 127.0.0.1
      API_PORT: "3000"
      DATABASE_URL: postgres://jailu:jailu@127.0.0.1:5432/jailu
      WEB_HOST: 127.0.0.1
      WEB_PORT: "5173"

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint
      - run: pnpm fmt:check
      - run: pnpm typecheck

      - run: pnpm --filter @jailu/api migrate
      - run: pnpm coverage

      # Build the SPA so e2e runs against the production artifact (static-served), not dev.
      - run: pnpm --filter @jailu/web build
      - run: pnpm --filter @jailu/web exec playwright install --with-deps chromium
      - run: pnpm test:e2e

  docker-smoke:
    name: docker compose smoke
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      # Boot the real dev stack — the same dev images and bind mounts as `docker compose up` —
      # so container-only breakage (cross-workspace module resolution, the router generator's
      # cross-device temp rename) fails CI here instead of on someone's laptop.
      - name: Boot the dev stack
        run: docker compose up -d --build --wait --wait-timeout 240

      - name: API health responds
        run: curl -fsS --retry 5 --retry-delay 3 --retry-all-errors http://localhost:3000/api/health

      - name: Web serves the app shell
        run: curl -fsS --retry 5 --retry-delay 3 --retry-all-errors http://localhost:5173/ | grep -q 'id="root"'

      # Guards the EXDEV regression: if the generator can't rename across the src bind mount,
      # the route tree is never written and the app is broken despite the server responding.
      - name: Router route tree generated in the container
        run: docker compose exec -T web test -s /app/apps/web/src/routeTree.gen.ts

      - name: Stack logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Tear down
        if: always()
        run: docker compose down -v
