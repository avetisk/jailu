name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: jailu
          POSTGRES_PASSWORD: jailu
          POSTGRES_DB: jailu
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U jailu"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      # The api config is defaults-free (fail-loud): CI supplies every required var.
      API_HOST: 127.0.0.1
      API_PORT: "3000"
      DATABASE_URL: postgres://jailu:jailu@127.0.0.1:5432/jailu

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint
      - run: pnpm fmt:check
      - run: pnpm typecheck

      - run: pnpm --filter @jailu/api migrate
      - run: pnpm coverage

      # Build the SPA so e2e runs against the production artifact (static-served), not dev.
      - run: pnpm --filter @jailu/web build
      - run: pnpm --filter @jailu/web exec playwright install --with-deps chromium
      - run: pnpm test:e2e
